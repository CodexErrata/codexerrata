<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="currentColor"/>
    </marker>
  </defs>
  <style>
    @media (prefers-color-scheme: dark) { :root { color: #e0e0e0; } }
    @media (prefers-color-scheme: light) { :root { color: #1a1a1a; } }
    text {
      font-family: "Courier New", Courier, monospace;
      fill: currentColor;
    }
  </style>

  <!-- Y-axis -->
  <line x1="80" y1="345" x2="80" y2="22"
    stroke="currentColor" stroke-width="0.8"
    marker-end="url(#arr)"/>

  <!-- X-axis -->
  <line x1="75" y1="340" x2="488" y2="340"
    stroke="currentColor" stroke-width="0.8"
    marker-end="url(#arr)"/>

  <!-- Curve: bell curve, peak in center -->
  <path d="M 80,334 C 148,334 198,44 281,44 C 364,44 414,334 482,334"
    fill="none" stroke="currentColor" stroke-width="1.2"/>

  <!-- Y-axis label -->
  <text x="22" y="195" text-anchor="middle" font-size="13"
    transform="rotate(-90 22 195)">Hostility</text>

  <!-- X-axis label -->
  <text x="282" y="388" text-anchor="middle" font-size="13">Similarity to self</text>

  <!-- X sub-labels -->
  <text x="80" y="360" text-anchor="middle" font-size="11">Identical</text>
  <text x="482" y="360" text-anchor="middle" font-size="11">Alien</text>
</svg>
